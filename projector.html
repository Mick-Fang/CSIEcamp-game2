<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>椰子怪討伐戰 2.0 — 投影大螢幕</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: var(--card-bg-dark); border-color: var(--card-border-dark); padding: 1.5rem; border-radius: 12px;}
        .team-box {
            background: rgba(30, 41, 59, 0.8); border: 2px solid #334155; border-radius: 12px; padding: 1.25rem; text-align: center;
            transition: all 0.3s ease;
        }
        .team-box.active { border-color: var(--ocean-medium); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .team-box.escaped { border-color: var(--success-green); opacity: 0.85; background: rgba(16, 185, 129, 0.1); }
        .team-box.dead { border-color: var(--danger-red); opacity: 0.4; filter: grayscale(1); }
        
        .teams-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; margin-top: 2.5rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1700px; padding: 2rem; display: flex; flex-direction: column; min-height: 90vh; justify-content: space-between;">
        
        <!-- Header -->
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 2rem;">
            <h1 style="font-size: 2.8rem; color: #fde047; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">🥥 椰子怪討伐戰：生存逃脫</h1>
            <h2 style="font-size: 2.2rem; margin: 0; color: #cbd5e1;">第 <span id="proj-round">-</span> 回合 — 第 <span id="proj-encounter">-</span> 隻遭遇</h2>
        </header>

        <!-- Main Content Area -->
        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
            
            <!-- SETUP -->
            <div id="view-setup" style="text-align: center; display: none;">
                <h2 style="font-size: 4rem; color: var(--sunset-orange); margin-bottom: 1rem;">準備就緒！</h2>
                <p style="font-size: 2rem; color: #94a3b8;">等待主持人開始遊戲...</p>
            </div>

            <!-- ENCOUNTER -->
            <div id="view-encounter" style="display: none; text-align: center;">
                <div style="display: flex; justify-content: center; gap: 4rem; align-items: center; margin-bottom: 2rem;">
                    <div style="width: 450px;">
                        <img id="proj-monster-img" src="" alt="Monster" style="width: 100%; border-radius: 16px; border: 4px solid var(--danger-red); box-shadow: 0 10px 25px rgba(239,68,68,0.3);">
                        <h2 id="proj-monster-name" style="font-size: 2.8rem; color: #fff; margin-top: 1.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">-</h2>
                        <p id="proj-monster-desc" style="color: #cbd5e1; font-size: 1.3rem; margin-top: 0.5rem;">-</p>
                    </div>
                    <div id="proj-cards-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 600px;">
                        <!-- Cards will be generated here -->
                    </div>
                </div>
                
                <div id="proj-result-text" style="font-size: 1.8rem; color: var(--sunset-yellow); min-height: 50px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 12px; display: inline-block;"></div>
            </div>

            <!-- ROUND END -->
            <div id="view-round-end" style="text-align: center; display: none;">
                <h2 style="font-size: 4.5rem; color: var(--success-green); margin-bottom: 3rem; text-shadow: 0 4px 10px rgba(16,185,129,0.4);">🎉 回合結束：資產結算 🎉</h2>
                <div id="round-end-leaderboard" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; text-align: left; max-width: 900px; margin: 0 auto; font-size: 1.8rem;">
                    <!-- End round stats -->
                </div>
            </div>

        </div>

        <!-- 隊伍狀態網格 (永遠在下方顯示) -->
        <div id="teams-grid" class="teams-grid"></div>

    </div>

    <script src="js/game.js"></script>
    <script src="js/projector.js"></script>
</body>
</html>
